name: GUI CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "ci/**"
  pull_request:
    branches:
      - main

env:
  DEPS_DIR: ${{ github.workspace }}/.ci-deps
  BUILD_TYPE: Release

jobs:
  gui-build:
    name: Build GUI and run GUI tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            libsdl2-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Restore Corrade/Magnum cache
        id: magnum-cache
        uses: actions/cache@v4
        with:
          path: .ci-deps
          key: magnum-deps-${{ runner.os }}-${{ hashFiles('.github/workflows/gui-ci.yml') }}

      - name: Configure dependency paths
        run: |
          echo "${DEPS_DIR}/bin" >> "$GITHUB_PATH"
          echo "CMAKE_PREFIX_PATH=${DEPS_DIR}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${DEPS_DIR}/lib/pkgconfig:${DEPS_DIR}/lib/x86_64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"

      - name: Build and install Corrade
        if: steps.magnum-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/mosra/corrade.git /tmp/corrade
          cmake -S /tmp/corrade -B /tmp/corrade/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_INSTALL_PREFIX=${DEPS_DIR}
          cmake --build /tmp/corrade/build
          cmake --install /tmp/corrade/build

      - name: Build and install Magnum
        if: steps.magnum-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/mosra/magnum.git /tmp/magnum
          cmake -S /tmp/magnum -B /tmp/magnum/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_INSTALL_PREFIX=${DEPS_DIR} \
            -DCMAKE_PREFIX_PATH=${DEPS_DIR} \
            -DMAGNUM_WITH_GL=ON \
            -DMAGNUM_WITH_SHADERS=ON \
            -DMAGNUM_WITH_SDL2APPLICATION=ON
          cmake --build /tmp/magnum/build
          cmake --install /tmp/magnum/build

      - name: Run GUI unit tests
        run: |
          make tests_run

      - name: Build GUI
        run: |
          make zappy_gui